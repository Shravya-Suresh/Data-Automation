# ===========================================================================
# SEC EDGAR 10-K / 10-Q Filing Keyword Taxonomy
# ---------------------------------------------------------------------------
# Covers AI + six strategic pillars (purpose, phygital experience, platform,
# personalization, participation, partnerships) plus digital transformation
# and AI-spend evidence for Lane 2 text extraction.
#
# Pattern notes:
#   - All patterns are regex, designed for case-insensitive matching.
#   - Short / ambiguous tokens (AI, ML, ESG, ...) use \b word boundaries.
#   - Multi-word phrases use \s+ to tolerate variable whitespace.
#
# Keyword vs key_word (notation):
#   - Only the PATTERN affects what is matched. Use \s+ for space in prose
#     (e.g. "machine learning"); a literal _ in the pattern matches underscore
#     in text (e.g. "machine_learning"), which is rare in SEC filings.
#   - The LABEL is only for output column names (spaces/hyphens → underscore).
#     Different labels that normalize to the same name (e.g. "key word" and
#     "key_word") would overwrite in the CSV; use distinct labels per keyword.
# ===========================================================================

groups:
  # -----------------------------------------------------------------------
  # AI
  # -----------------------------------------------------------------------
  - name: ai
    display_name: "AI"
    keywords:
      - label: "artificial intelligence"
        pattern: "\\bartificial\\s+intelligence\\b"
        is_phrase: true
      - label: "AI"
        pattern: "\\bAI\\b"
        is_phrase: false
      - label: "machine learning"
        pattern: "\\bmachine\\s+learning\\b"
        is_phrase: true
      - label: "ML"
